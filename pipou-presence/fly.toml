# Déploiement Fly.io du service de présence PipouLauncher.
# Déploie : flyctl launch --copy-config --now   (ou : flyctl deploy)
app = "pipou-presence"
primary_region = "cdg"

[build]
  builder = "heroku/builder:24"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
